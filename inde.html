<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script defer src="script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div
      id="cont"
      class="flex flex-col justify-center items-center bg-gradient-to-r from-cyan-500 to-blue-500 min-h-screen"
    >
      <!-- Form To add -->
      <form
        class="card shadow-lg shadow-[#333] rounded-lg grid grid-cols-3 w-[600px] py-4 text-xl px-4"
      >
        <h1 class="font-bold text-2xl col-span-3 b text-center mb-4">
          Colorie Checker
        </h1>

        <input id="inputV" type="text" class="h-[30px] rounded-lg px-2 col-span-2" />

        <button
          type="submit"
          class=" font-bold mx-2 bg-cyan-700  rounded-xl text-white hover:bg-cyan-900 hover:scale-105 transform transition duration-300"
        >
          Add Food
        </button>
        <!-- Dive to display result -->
        <div
          id="resultDiv"
          class="hidden card col-span-3 rounded-lg flex flex-col justify-between items-left px-4 w-[600px] py-4 text-xl"
        >
          <ul id="foodItem"></ul>
        </div>
      </form>
    </div>
  </body>
</html>
